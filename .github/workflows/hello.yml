name: Docker Container ile Calisma

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Cache klasorunu geri yukle
        uses: actions/cache@v4
        with:
          path: ./kalici-veri
          key: kalici-veri-cache-v1

      - name: Container bilgisi goster
        run: |
          echo "--- CONTAINER BILGISI ---"
          echo "Node surumu: $(node --version)"
          echo "NPM surumu: $(npm --version)"
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "Kullanici: $(whoami)"

      - name: Kalici dosyalari kontrol et ve guncelle
        run: |
          mkdir -p ./kalici-veri
          SAYAC_DOSYA=./kalici-veri/sayac.txt
          LOG_DOSYA=./kalici-veri/calisma-gecmisi.log

          if [ -f "$SAYAC_DOSYA" ]; then
            SAYAC=$(cat $SAYAC_DOSYA)
            echo "Onceki calisma sayisi: $SAYAC"
          else
            SAYAC=0
            echo "Ilk calisma! Sayac sifirdan basliyor."
          fi

          SAYAC=$((SAYAC + 1))
          echo $SAYAC > $SAYAC_DOSYA

          echo "$(date): Calisma #$SAYAC tamamlandi" >> $LOG_DOSYA
          echo "Simdi calisma numarasi: $SAYAC"
          echo "--- GECMIS LOG ---"
          cat $LOG_DOSYA

      - name: Cache kaydet
        uses: actions/cache@v4
        with:
          path: ./kalici-veri
          key: kalici-veri-cache-v1
